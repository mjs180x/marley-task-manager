<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Task Manager</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#081848">
<style>
/* original styles preserved */
body{background:#081848;color:#fff;font-family:sans-serif}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="loading">Loading…</div>
<div id="app"></div>
<script>
// ---- Original state ----
let S = JSON.parse(localStorage.getItem('mstm')||'{"tasks":[],"nextId":1}');
function saveS(){localStorage.setItem('mstm',JSON.stringify(S))}
function render(){document.getElementById('app').innerHTML = S.tasks.map(t=>`<div>${t.title}</div>`).join('')||'No tasks'}

// ---- API ----
const SHEET_URL='https://script.google.com/macros/s/AKfycbzwuyLQdHAuwI12WXOWm1iy-EkpebRkMQSD65xS4kGNs9olWkK2rY05Ry6glNLiCS8n3A/exec';
async function api(action,body){
  const r = await fetch(SHEET_URL+'?action='+action,{method:body?'POST':'GET',body:body?JSON.stringify(body):null});
  return r.json();
}

// ---- FIXED fetchAll ----
async function fetchAll(){
  const d = await api('getAll');
  if(d?.tasks){
    S.tasks = d.tasks.map(t=>({...t,id:Number(t.id)}));
    S.nextId = Math.max(S.nextId,...S.tasks.map(t=>t.id+1));
    saveS();
  }
}

// ---- FIXED boot (non blocking) ----
async function boot(){
  let done=false;
  const fs=setTimeout(()=>{if(!done){document.getElementById('loading').style.display='none';render();done=true;}},2000);
  fetchAll().catch(()=>{}).finally(()=>{
    clearTimeout(fs);
    document.getElementById('loading').style.display='none';
    render();
    done=true;
  });
}
boot();

if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js');}
</script>
</body>
</html>
