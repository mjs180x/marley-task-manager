<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Task Manager</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e2a">
</head>
<body style="background:#1e1e2a;color:#fff;font-family:sans-serif;">

<div id="loading">Loading…</div>
<div id="app"></div>

<script>
/* -------- ORIGINAL APP STATE (UNCHANGED) -------- */
let S = JSON.parse(localStorage.getItem('mstm') || '{"tasks":[],"nextId":1}');
function saveS(){localStorage.setItem('mstm', JSON.stringify(S));}
function render(){
  document.getElementById('app').innerHTML =
    S.tasks.length ? S.tasks.map(t => `<div>${t.title}</div>`).join('') : 'No tasks';
}

/* -------- GOOGLE SHEETS API (UNCHANGED) -------- */
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzwuyLQdHAuwI12WXOWm1iy-EkpebRkMQSD65xS4kGNs9olWkK2rY05Ry6glNLiCS8n3A/exec';
async function api(action){
  const r = await fetch(SHEET_URL + '?action=' + action);
  return r.json();
}

/* -------- FIXED NON-BLOCKING FETCH -------- */
async function fetchAll(){
  try{
    const d = await api('getAll');
    if(d && Array.isArray(d.tasks)){
      S.tasks = d.tasks.map(t => ({...t, id:Number(t.id)}));
      S.nextId = Math.max(S.nextId, ...S.tasks.map(t => t.id+1));
      saveS();
    }
  }catch(e){ console.warn('Offline mode'); }
}

/* -------- FIXED BOOT -------- */
function boot(){
  document.getElementById('loading').style.display = 'none';
  render();

  fetchAll().then(render).catch(()=>{});
}

boot();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
